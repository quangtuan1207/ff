<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN PODEV</title>
    <style>
        body { background: #000; color: #ffcc00; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .box { border: 2px solid #ffcc00; padding: 30px; border-radius: 15px; background: #111; display: inline-block; width: 300px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; text-align: center; }
        button { width: 100%; padding: 12px; background: #ffcc00; border: none; font-weight: bold; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h3>TẠO KEY VIP</h3>
        <input type="text" id="newKey" placeholder="Gõ Key muốn tạo...">
        <button onclick="addKey()">LƯU LÊN SERVER</button>
        <br><br>
        <a href="index.html" style="color: #666; text-decoration: none; font-size: 13px;">← Quay lại trang chủ</a>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxi0evrjODjhmPcvXXlzNlc29In46ZjeDGMatZLOPI5xw_8Dk8hbD544zWZkOikhYM/exec";

        function addKey() {
            const key = document.getElementById('newKey').value.trim();
            if(!key) return;
            document.querySelector('button').innerText = "ĐANG LƯU...";
            fetch(`${SCRIPT_URL}?action=add&key=${key}`)
                .then(res => res.text())
                .then(() => {
                    alert("ĐÃ TẠO KEY: " + key);
                    document.getElementById('newKey').value = "";
                    document.querySelector('button').innerText = "LƯU LÊN SERVER";
                });
        }
    </script>
</body>
</html>
