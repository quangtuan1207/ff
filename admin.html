<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN PODEV</title>
    <style>
        body { background: #000; color: #ffcc00; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .admin-box { border: 2px solid #ffcc00; padding: 30px; border-radius: 15px; background: #111; width: 300px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #ffcc00; border: none; font-weight: bold; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="admin-box">
        <h3>QUẢN LÝ KEY</h3>
        <input type="text" id="newKey" placeholder="Nhập Key muốn tạo...">
        <button onclick="addKey()">TẠO & LƯU LÊN SERVER</button>
        <p style="font-size: 11px; color: #666; margin-top: 15px;">Key tạo xong sẽ có tác dụng ngay lập tức</p>
        <a href="index.html" style="color: #ffcc00; text-decoration: none; font-size: 13px;">← Quay lại</a>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzAqGF_uqCeBhLVsCxtdNrfsS8kF5pXYV1PHHmYKF_geiL1809gFRPSdR628LMUGCaGUQ/exec";

        function addKey() {
            const key = document.getElementById('newKey').value.trim();
            if(!key) return alert("Nhập key!");
            
            document.querySelector('button').innerText = "ĐANG LƯU...";
            
            fetch(`${SCRIPT_URL}?action=add&key=${key}`)
                .then(res => res.text())
                .then(data => {
                    alert("ĐÃ TẠO THÀNH CÔNG KEY: " + key);
                    document.getElementById('newKey').value = "";
                    document.querySelector('button').innerText = "TẠO & LƯU LÊN SERVER";
                });
        }
    </script>
</body>
</html>
