<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN PODEV - TẠO KEY VIP</title>
    <style>
        :root { --gold: #ffcc00; --dark: #0a0a0a; }
        body { background: var(--dark); color: var(--gold); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .admin-card { 
            border: 2px solid var(--gold); 
            border-radius: 20px; 
            background: #111; 
            padding: 30px; 
            text-align: center; 
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.3); 
            width: 320px; 
        }

        h2 { letter-spacing: 2px; text-shadow: 0 0 10px var(--gold); }
        p { color: #888; font-size: 13px; margin-bottom: 20px; }

        input { 
            width: 100%; 
            padding: 12px; 
            border-radius: 10px; 
            border: 1px solid #333; 
            background: #1a1a1a; 
            color: #fff; 
            margin-bottom: 15px; 
            box-sizing: border-box; 
            text-align: center;
            outline: none;
        }

        input:focus { border-color: var(--gold); }

        .btn-create { 
            width: 100%; 
            padding: 12px; 
            border-radius: 10px; 
            border: none; 
            background: linear-gradient(45deg, #ffcc00, #ffaa00); 
            color: #000; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.2s;
        }

        .btn-create:active { transform: scale(0.95); }

        .back-link { 
            display: block; 
            margin-top: 20px; 
            color: #666; 
            text-decoration: none; 
            font-size: 13px; 
        }
        
        .back-link:hover { color: var(--gold); }

        /* Thông báo nhỏ phía dưới */
        #status { margin-top: 15px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="admin-card">
    <h2>ADMIN PANEL</h2>
    <p>Chào Podev, hãy tạo mã cho khách</p>
    
    <input type="text" id="newKey" placeholder="Nhập Key muốn tạo (Ví dụ: VIP1)">
    
    <button class="btn-create" onclick="createKey()">TẠO & LƯU SERVER</button>
    
    <div id="status"></div>

    <a href="index.html" class="back-link">← Quay lại trang chủ</a>
</div>

<script>
    // Link /exec của Google Script bạn đã lấy ở bước trước
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxi0evrjODjhmPcvXXlzNlc29In46ZjeDGMatZLOPI5xw_8Dk8hbD544zWZkOikhYM/exec";

    // Bảo mật: Nếu vào trực tiếp mà chưa qua Login ADMIN thì cảnh báo (tùy chọn)
    if (localStorage.getItem("role") !== "admin") {
        console.log("Cảnh báo: Truy cập trang quản trị.");
    }

    function createKey() {
        const val = document.getElementById('newKey').value.trim();
        const status = document.getElementById('status');
        const btn = document.querySelector('.btn-create');

        if (!val) {
            alert("Vui lòng nhập tên mã!");
            return;
        }

        // Rung nhẹ khi bấm nút
        if (navigator.vibrate) navigator.vibrate(50);

        btn.innerText = "ĐANG LƯU...";
        btn.disabled = true;
        status.innerText = "";

        // Gửi lệnh 'add' lên Google Script
        fetch(`${SCRIPT_URL}?action=add&key=${val}`)
            .then(res => res.text())
            .then(data => {
                if (data.trim() === "Success") {
                    status.style.color = "#00ff00";
                    status.innerText = "THÀNH CÔNG: ĐÃ LƯU KEY " + val;
                    document.getElementById('newKey').value = "";
                    if (navigator.vibrate) navigator.vibrate([50, 50, 50]); // Rung báo thành công
                } else {
                    status.style.color = "#ff4444";
                    status.innerText = "LỖI KHI LƯU!";
                }
                btn.innerText = "TẠO & LƯU SERVER";
                btn.disabled = false;
            })
            .catch(err => {
                status.style.color = "#ff4444";
                status.innerText = "LỖI KẾT NỐI SERVER!";
                btn.innerText = "TẠO & LƯU SERVER";
                btn.disabled = false;
            });
    }
</script>

</body>
</html>
