<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podev VIP - Quản Lý Key</title>
    <style>
        body { background: #000; color: #ffcc00; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .box { border: 2px solid #ffcc00; padding: 20px; display: inline-block; border-radius: 15px; background: #111; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #ffcc00; background: #222; color: #fff; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #ffcc00; color: #000; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .back-btn { margin-top: 20px; display: block; color: #888; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>

<div class="box">
    <h2>QUẢN LÝ KEY VIP</h2>
    <input type="text" id="newKey" placeholder="Nhập Key muốn tạo...">
    <br>
    <button onclick="addKey()">THÊM KEY VÀO HỆ THỐNG</button>
    <a href="index.html" class="back-btn"> Quay lại trang đăng nhập</a>
</div>

<script>
    // Kiểm tra xem có phải là Admin không, nếu không thì đuổi ra
    if (localStorage.getItem("role") !== "admin") {
        alert("Bạn không có quyền truy cập!");
        window.location.href = "index.html";
    }

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxi0evrjODjhmPcvXXlzNlc29In46ZjeDGMatZLOPI5xw_8Dk8hbD544zWZkOikhYM/exec";

    function addKey() {
        const key = document.getElementById('newKey').value;
        if (!key) return alert("Nhập key đã bạn ơi!");

        const btn = document.querySelector('button');
        btn.innerText = "ĐANG TẠO...";

        fetch(`${SCRIPT_URL}?action=add&key=${key}`)
            .then(res => res.text())
            .then(data => {
                if (data.trim() === "Success") {
                    alert("Đã thêm Key: " + key + " thành công!");
                    document.getElementById('newKey').value = "";
                } else {
                    alert("Lỗi khi thêm key!");
                }
                btn.innerText = "THÊM KEY VÀO HỆ THỐNG";
            })
            .catch(() => alert("Lỗi kết nối!"));
    }
</script>

</body>
</html>
