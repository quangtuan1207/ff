<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PODEV VIP - 11A1</title>
    <style>
        :root { --gold: #ffcc00; --dark: #0a0a0a; }
        body { background: var(--dark); color: var(--gold); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .login-card { border: 2px solid var(--gold); border-radius: 20px; background: #111; padding: 40px; text-align: center; box-shadow: 0 0 20px rgba(255, 204, 0, 0.3); width: 320px; transition: 0.3s; position: relative; }
        
        /* Hiệu ứng Rung khi sai */
        .shake { animation: shake 0.4s; border-color: #ff4444; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        h2 { letter-spacing: 3px; text-shadow: 0 0 10px var(--gold); margin-bottom: 5px; }
        .sub-text { font-size: 10px; color: #666; margin-bottom: 20px; text-transform: uppercase; }
        
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #1a1a1a; color: #fff; margin-bottom: 20px; box-sizing: border-box; font-size: 16px; text-align: center; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(255, 204, 0, 0.2); }

        .btn-main { width: 100%; padding: 15px; border-radius: 12px; border: none; background: linear-gradient(45deg, #ffcc00, #ffaa00); color: #000; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3); }
        .btn-main:active { transform: scale(0.95); }

        #menu-box { display: none; }
        .feature { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #222; font-size: 14px; }
        .on { color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-card" id="login-box">
    <h2>PODEV VIP</h2>
    <div class="sub-text">Bản quyền thuộc về lớp 11A1</div>
    <input type="text" id="keyInput" placeholder="NHẬP KEY KÍCH HOẠT">
    <button class="btn-main" onclick="handleLogin()">KÍCH HOẠT NGAY</button>
</div>

<div class="login-card" id="menu-box">
    <h2>MENU MOD</h2>
    <div class="feature"><span>Auto Headshot</span><span class="on">ON</span></div>
    <div class="feature"><span>Ghìm tâm nhạy</span><span class="on">ON</span></div>
    <div class="feature"><span>Xóa sương mù</span><span class="on">ON</span></div>
    <br>
    <button class="btn-main" style="background: #333; color: #fff;" onclick="location.reload()">ĐĂNG XUẤT</button>
</div>

<script>
    // THAY LINK /EXEC MỚI NHẤT CỦA BẠN VÀO ĐÂY
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzAqGF_uqCeBhLVsCxtdNrfsS8kF5pXYV1PHHmYKF_geiL1809gFRPSdR628LMUGCaGUQ/exec";

    function handleLogin() {
        const input = document.getElementById('keyInput').value.trim();
        const box = document.getElementById('login-box');

        // Rung nhẹ điện thoại khi bấm (chỉ chạy trên Android/Chrome)
        if (navigator.vibrate) navigator.vibrate(50);

        if (input === 'ADMIN') {
            window.location.href = 'admin.html';
            return;
        }

        document.querySelector('.btn-main').innerText = "ĐANG CHECK...";

        fetch(`${SCRIPT_URL}?action=check&key=${input}`)
            .then(res => res.text())
            .then(data => {
                if (data.trim() === "Valid") {
                    box.style.display = 'none';
                    document.getElementById('menu-box').style.display = 'block';
                } else {
                    // Hiệu ứng rung màn hình và báo lỗi
                    box.classList.add('shake');
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100]); // Rung kiểu báo lỗi
                    alert("KEY SAI HOẶC HẾT HẠN!");
                    setTimeout(() => box.classList.remove('shake'), 400);
                    document.querySelector('.btn-main').innerText = "KÍCH HOẠT NGAY";
                }
            })
            .catch(() => {
                alert("LỖI KẾT NỐI SERVER!");
                document.querySelector('.btn-main').innerText = "KÍCH HOẠT NGAY";
            });
    }
</script>
</body>
</html>
