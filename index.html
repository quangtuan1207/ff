<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PODEV VIP MENU</title>
    <style>
        :root { --gold: #ffcc00; --dark: #0a0a0a; --glow: rgba(255, 204, 0, 0.4); }
        body { margin: 0; background: var(--dark); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); }
        .container { width: 90%; max-width: 350px; background: rgba(20, 20, 20, 0.95); border: 2px solid var(--gold); border-radius: 25px; padding: 30px 20px; box-shadow: 0 0 30px var(--glow); text-align: center; animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        h1 { color: var(--gold); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 25px; text-shadow: 0 0 15px var(--gold); font-size: 28px; }
        input { width: 85%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #111; color: var(--gold); font-size: 16px; outline: none; text-align: center; transition: 0.3s; margin-bottom: 20px; }
        input:focus { border-color: var(--gold); box-shadow: 0 0 10px var(--glow); }
        .btn { width: 95%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.4s; text-transform: uppercase; }
        .btn-gold { background: var(--gold); color: #000; box-shadow: 0 5px 15px var(--glow); }
        .menu-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 15px 20px; border-radius: 15px; margin-bottom: 12px; border-left: 4px solid var(--gold); }
        .switch { position: relative; width: 45px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--gold); }
        input:checked + .slider:before { transform: translateX(20px); }
        .footer-link { margin-top: 20px; font-size: 12px; color: #666; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
    <div id="bg"></div>

    <div id="login-box" class="container">
        <h1>PODEV VIP</h1>
        <input type="text" id="key" placeholder="NHẬP KEY KÍCH HOẠT...">
        <button class="btn btn-gold" onclick="login()">KÍCH HOẠT NGAY</button>
        <p style="font-size: 10px; color: #555; margin-top: 15px;">DÀNH RIÊNG CHO LỚP 11A1</p>
    </div>

    <div id="menu-box" class="container" style="display:none">
        <h1>PODEV MENU</h1>
        <div class="menu-item"><span>FIX RUNG 100%</span><label class="switch"><input type="checkbox" onchange="vibrateDevice()"><span class="slider"></span></label></div>
        <div class="menu-item"><span>NHẸ TÂM (SMOOTH)</span><label class="switch"><input type="checkbox" onchange="vibrateDevice()"><span class="slider"></span></label></div>
        <div class="menu-item"><span>AUTO HEADSHOT</span><label class="switch"><input type="checkbox" onchange="vibrateDevice()"><span class="slider"></span></label></div>
        
        <button class="btn btn-gold" style="background: #10b981; color: #fff;" onclick="openGame()">VÀO GAME (FF/MAX)</button>
        <div class="footer-link" onclick="logout()">Đăng xuất thiết bị</div>
    </div>

    <script>
        // THAY LINK CỦA BẠN VÀO ĐÂY
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxi0evrjODjhmPcvXXlzNlc29In46ZjeDGMatZLOPI5xw_8Dk8hbD544zWZkOikhYM/exec";

        function vibrateDevice() { if (navigator.vibrate) navigator.vibrate(50); }

        function login() {
            const keyVal = document.getElementById('key').value.trim();
            if(!keyVal) return alert("Vui lòng nhập mã Key!");
            
            vibrateDevice();
            if(keyVal.toUpperCase() === "ADMIN") { window.location.href = "admin.html"; return; }

            document.querySelector('.btn-gold').innerText = "ĐANG KIỂM TRA...";
            fetch(`${SCRIPT_URL}?action=check&key=${keyVal}`)
                .then(res => res.text())
                .then(data => {
                    if(data.trim() === "Valid") {
                        localStorage.setItem("podev_auth", "true");
                        showMenu();
                    } else {
                        alert("Key sai hoặc đã hết hạn!");
                        document.querySelector('.btn-gold').innerText = "KÍCH HOẠT NGAY";
                    }
                }).catch(() => alert("Lỗi kết nối Server!"));
        }

        function openGame() {
            vibrateDevice();
            window.location.href = "freefire://"; // Thử mở FF thường
            setTimeout(() => { if (document.hasFocus()) window.location.href = "freefiremax://"; }, 1000); // Không được thì mở MAX
        }

        function showMenu() { document.getElementById('login-box').style.display = 'none'; document.getElementById('menu-box').style.display = 'block'; }
        function logout() { localStorage.clear(); location.reload(); }
        window.onload = () => { if(localStorage.getItem("podev_auth") === "true") showMenu(); }
    </script>
</body>
</html>
